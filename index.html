<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Token</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0f172a, #1e293b);
  min-height: 100vh;
}

/* CONTAINER */
.comic-container {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 12px;
  max-width: 1100px;
  margin: 40px auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  min-height: 800px;
  display: flex;
  flex-direction: column;
}

/* PAGE GRID */
.page {
  display: none;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  animation: fade 0.4s ease;
  flex-grow: 1;
}

.left {
  display: grid;
  grid-template-rows: 2fr 1fr;
  gap: 12px;
}

.right {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
}

/* PANELS */
.panel {
  background-size: cover;
  background-position: center;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  min-height: 200px;
}

.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}

/* BUTTONS */
.controls {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  padding-top: 20px;
}

button {
  background: #111;
  color: white;
  border: 1px solid #444;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: bold;
}

button:hover {
  background: #333;
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ANIMATION */
@keyframes fade {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
</style>
</head>

<body>

<div class="comic-container">

  <!-- PAGE 1 -->
  <div class="page">
    <div class="left">
      <div class="panel" style="background-image: url('https://cdn.phototourl.com/free/2026-04-07-b50427c6-18dc-4f51-996a-5afaf8629132.png');"></div>
      <div class="panel" style="background-image: url('https://i.postimg.cc/ry0jpyDk/cbd39982-460d-4247-9847-00fc041c7a50.jpg');"></div>
    </div>
    <div class="right">
      <div class="panel" style="background-image: url('https://i.postimg.cc/tJQxJjc9/d22c2eec-8ca1-4b49-bdb1-1547c84ad66e.jpg');"></div>
      <div class="panel" style="background-image: url('https://i.postimg.cc/0yWKmm4Z/64159659-6369-4629-b79e-ce55f6c2b897.jpg');"></div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <div class="left">
      <div class="panel" style="background-image: url('https://i.postimg.cc/ydFNfSLr/c4fedf73-eed5-4613-a4f4-d52646855788.jpg');"></div>
      <div class="panel" style="background-image: url('https://via.placeholder.com/600x400');"></div>
    </div>
    <div class="right">
      <div class="panel" style="background-image: url('https://via.placeholder.com/400x400');"></div>
      <div class="panel" style="background-image: url('https://via.placeholder.com/400x400');"></div>
    </div>
  </div>

  <!-- PAGE FINAL -->
  <div class="page" style="display:flex; justify-content:center; align-items:center; flex-direction:column;">
    <h1>Next chapter when token hits 50k</h1>
    <a href="https://pump.fun" target="_blank" style="margin-top:20px; background:black; color:white; padding:15px 25px; border-radius:10px; text-decoration:none; font-weight: bold;">
      BUY TOKEN
    </a>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="btn-back" onclick="prevPage()">BACK</button>
    <button id="btn-next" onclick="nextPage()">NEXT PAGE</button>
  </div>

</div>

<script>
let currentPage = 0;
const pages = document.querySelectorAll(".page");
const btnBack = document.getElementById("btn-back");
const btnNext = document.getElementById("btn-next");

function showPage(index) {
  pages.forEach((p, i) => {
    p.style.display = i === index ? (i === pages.length - 1 ? "flex" : "grid") : "none";
  });
  
  // Update button states
  btnBack.disabled = index === 0;
  btnNext.disabled = index === pages.length - 1;
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    currentPage++;
    showPage(currentPage);
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    showPage(currentPage);
  }
}

showPage(currentPage);
</script>

</body>
</html>
